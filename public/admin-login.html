<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Admin — Pointage</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(180deg, #0d47a1 0%, #1976d2 100%);
      color: #fff;
    }
    .login-card {
      width: min(420px, 92vw);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 22px;
      padding: 30px 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.28);
      backdrop-filter: blur(12px);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }
    p {
      margin: 0 0 22px;
      color: rgba(255,255,255,0.82);
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.85);
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    .pw-wrap {
      position: relative;
    }
    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255,255,255,0.9);
    }
    .pw-toggle:active { transform: translateY(-50%) scale(.98); }
    input:focus {
      border-color: #bbdefb;
      background: rgba(255,255,255,0.18);
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #ffffff;
      color: #0d47a1;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      transition: transform .15s ease, background .15s ease;
    }
    button:hover { transform: translateY(-1px); background: #f1f5f9; }
    .error {
      color: #ffccbc;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,205,178,0.45);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 18px;
    }
    .hint {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Connexion administrateur</h1>
    <p>Entrez vos accès pour accéder au tableau de bord de pointage.</p>

    <div id="error" class="error" style="display:none;">Identifiants incorrects. Réessayez.</div>

    <form method="POST" action="/admin-login">
      <label for="username">Nom d'utilisateur</label>
      <input id="username" name="username" type="text" autocomplete="username" required>

        <label for="password">Mot de passe</label>
        <div class="pw-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required>
          <button type="button" id="pw-toggle" class="pw-toggle" aria-label="Afficher le mot de passe">👁️</button>
        </div>

      <button type="submit">Se connecter</button>
    </form>

    <p class="hint">Si vous venez de modifier .env, redémarrez le serveur serveur avant d’ouvrir cette page.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('error')) {
      document.getElementById('error').style.display = 'block';
    }
    // Password visibility toggle
    (function(){
      const pw = document.getElementById('password');
      const btn = document.getElementById('pw-toggle');
      if (!pw || !btn) return;
      btn.addEventListener('click', () => {
        const isPwd = pw.type === 'password';
        pw.type = isPwd ? 'text' : 'password';
        btn.textContent = isPwd ? '🙈' : '👁️';
        btn.setAttribute('aria-label', isPwd ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
      });
    })();
  </script>
</body>
</html>

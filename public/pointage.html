<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointage Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(150deg, #0d47a1 0%, #1565c0 55%, #1976d2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 44px 36px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .35);
      text-align: center;
    }

    .icon { font-size: 56px; margin-bottom: 14px; }

    h1 {
      color: #0d47a1;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      font-size: 13px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      text-align: left;
      margin-bottom: 7px;
    }

    input[type="text"] {
      width: 100%;
      padding: 13px 16px;
      font-size: 15px;
      border: 2px solid #e3e8f0;
      border-radius: 10px;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus { border-color: #0d47a1; }

    /* ── Toggle Arrivée / Sortie ── */
    .type-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .type-btn {
      flex: 1;
      padding: 11px 6px;
      font-size: 13.5px;
      font-weight: 700;
      border: 2px solid #e3e8f0;
      border-radius: 10px;
      cursor: pointer;
      background: #f5f7fb;
      color: #666;
      transition: all .2s;
    }

    .type-btn.active-arrivee {
      background: #e8f5e9;
      border-color: #43a047;
      color: #1b5e20;
    }

    .type-btn.active-sortie {
      background: #fff3e0;
      border-color: #fb8c00;
      color: #e65100;
    }

    .scan-choice {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .scan-btn {
      flex: 1;
      padding: 11px 6px;
      font-size: 13.5px;
      font-weight: 700;
      border: 2px solid #e3e8f0;
      border-radius: 10px;
      cursor: pointer;
      background: #f5f7fb;
      color: #666;
      transition: all .2s;
    }

    .scan-btn.active {
      background: #e3f2fd;
      border-color: #0d47a1;
      color: #0d47a1;
    }

    .badge-section {
      text-align: left;
      margin-bottom: 20px;
    }

    .badge-section input[type="text"] {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background: #0d47a1;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: .3px;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #1565c0;
      transform: translateY(-1px);
    }

    button[type="submit"]:disabled {
      background: #b0bec5;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      display: none;
      margin-top: 22px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      line-height: 1.7;
      text-align: left;
    }

    .alert.success {
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #a5d6a7;
    }

    .alert.error {
      background: #ffebee;
      color: #b71c1c;
      border: 1px solid #ef9a9a;
    }

    /* ── État GPS ── */
    .geo-status {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13px;
      color: #0d47a1;
      margin-bottom: 20px;
    }

    .geo-status.ok  { background: #e8f5e9; border-color: #a5d6a7; color: #1b5e20; }
    .geo-status.err { background: #ffebee; border-color: #ef9a9a; color: #b71c1c; }

    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#128203;</div>
    <h1>Pointage des Agents</h1>
    <p class="subtitle">Sélectionnez le type de pointage puis entrez votre nom</p>

    <!-- Statut GPS -->
    <div id="geo-box" class="geo-status">
      <div class="spinner"></div>
      <span>Localisation GPS en cours…</span>
    </div>

    <form id="form" autocomplete="off" novalidate style="display:none">
      <input type="hidden" id="badge-id-hidden" name="badge_id" value="" />
      <!-- Toggle Arrivée / Sortie -->
      <div class="type-toggle">
        <button type="button" id="btn-arrivee" class="type-btn active-arrivee" onclick="selectType('arrivee')">🟢 Arrivée</button>
        <button type="button" id="btn-sortie"  class="type-btn" onclick="selectType('sortie')">🔴 Sortie</button>
      </div>

      <label for="nom">Nom Complet</label>
      <input
        id="nom"
        type="text"
        placeholder="Ex : Mohamed Amine Benali"
        maxlength="100"
        required
      >

      <label for="code" style="margin-top: 14px;">Code Agent (optionnel)</label>
      <input
        id="code"
        type="password"
        placeholder="Code personnel"
        maxlength="20"
        autocomplete="off"
      >

      <button id="btn" type="submit">✅ Valider le Pointage Arrivée</button>
    </form>

    <div id="alert" class="alert" role="alert" aria-live="polite"></div>
  </div>

  <script>
    'use strict';

    // ─── Récupération du token dans l'URL ────────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    let TOKEN = urlParams.get('token');
    // Traiter les valeurs communes invalides comme l'absence de token
    if (TOKEN === 'undefined' || TOKEN === 'null' || TOKEN === '') TOKEN = null;
    // Si un token est présent mais malformé, le considérer comme absent (mode statique)
    if (typeof TOKEN === 'string' && !/^[0-9a-f]{16}$/.test(TOKEN)) TOKEN = null;

    const form          = document.getElementById('form');
    const btn           = document.getElementById('btn');
    const alertEl       = document.getElementById('alert');
    const geoBox        = document.getElementById('geo-box');
    const btnArr        = document.getElementById('btn-arrivee');
    const btnSortie     = document.getElementById('btn-sortie');
    const badgeIdHidden = document.getElementById('badge-id-hidden');

    let userLat      = null;
    let userLng      = null;
    let selectedType = 'arrivee'; // type actif
    let SESSION_ID   = null; // sessionId créée après validation du token

    function selectScanMode() {
      initializeSession();
    }

    let codeReader = null;
    async function startCameraScanner() {
      if (typeof ZXingBrowser === 'undefined') return;
      if (codeReader) return;
      const qrRegion = document.getElementById('qr-reader');
      qrRegion.style.display = 'block';
      codeReader = new ZXingBrowser.BrowserMultiFormatReader();
      try {
        const hints = new Map();
        const formats = [
          ZXingBrowser.BarcodeFormat.QR_CODE,
          ZXingBrowser.BarcodeFormat.CODE_128
        ];
        hints.set(ZXingBrowser.DecodeHintType.POSSIBLE_FORMATS, formats);
        codeReader.setHints(hints);
      } catch {
        // ignore if hints are not supported
      }

      try {
        await codeReader.decodeFromVideoDevice(
          null,
          'qr-reader',
          async (result, error) => {
            if (result) {
              await onBadgeScanned(result.getText());
              await stopCameraScanner();
            }
          }
        );
      } catch (err) {
        console.warn('Camera scanner failed', err);
      }
    }

    async function stopCameraScanner() {
      if (!codeReader) return;
      try { codeReader.reset(); } catch {}
      codeReader = null;
    }

    window.addEventListener('beforeunload', () => { stopCameraScanner(); });

    function selectType(type) {
      selectedType = type;
      if (type === 'arrivee') {
        btnArr.className    = 'type-btn active-arrivee';
        btnSortie.className = 'type-btn';
        btn.textContent     = '✅ Valider le Pointage Arrivée';
        btn.style.background = '#1b5e20';
      } else {
        btnArr.className    = 'type-btn';
        btnSortie.className = 'type-btn active-sortie';
        btn.textContent     = '✅ Valider le Pointage Sortie';
        btn.style.background = '#e65100';
      }
      // Reset alerte si l'agent change de type après un échec
      alertEl.style.display = 'none';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showFatalError(msg) {
      geoBox.style.display  = 'none';
      form.style.display    = 'none';
      alertEl.className     = 'alert error';
      alertEl.textContent   = '❌ ' + msg;
      alertEl.style.display = 'block';
    }

    // ─── Device ID enrichi : inclut des propriétés du navigateur ────────────
    function getEnrichedDeviceId() {
      let id = localStorage.getItem('pointage_device_id');
      if (!id) {
        // Créer un ID unique basé sur crypto + timestamp
        id = (crypto.randomUUID ? crypto.randomUUID() :
          Date.now().toString(36) + Math.random().toString(36).slice(2));
        localStorage.setItem('pointage_device_id', id);
      }
      return id;
    }
    const DEVICE_ID = getEnrichedDeviceId();

    // ─── INITIALISATION SÉCURISÉE : Valider le token et créer une session ────
    async function initializeSession() {
      // Si aucun token (QR imprimé/statique), autoriser le formulaire sans session.
      if (!TOKEN) {
        // Mode QR imprimé : on montre directement le formulaire.
        SESSION_ID = null;
        geoBox.style.display = 'none';
        form.style.display = 'block';
        return;
      }

      geoBox.innerHTML = '<div class="spinner"></div><span>Vérification du QR code…</span>';
      geoBox.style.display = 'block';
      form.style.display = 'none';

      try {
        // Appel au serveur pour valider le token et créer une session
        const res = await fetch('/init-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN })
        });

        const data = await res.json();

        if (res.ok && data.sessionId) {
          // ✅ Session créée avec succès
          SESSION_ID = data.sessionId;
          geoBox.style.display = 'none';
          form.style.display = 'block';
          alertEl.style.display = 'none';
        } else {
          // ❌ Token invalide ou expiré
          showFatalError(data.error || 'QR code invalide. Rescannez le code.');
        }
      } catch (err) {
        showFatalError('Impossible de valider le QR code. Vérifiez votre connexion.');
      }
    }

    // Tentative GPS en arrière-plan
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
        },
        () => { /* GPS non disponible — silencieux */ },
        { enableHighAccuracy: false, timeout: 5000, maximumAge: 60000 }
      );
    }

    // ─── Soumission du formulaire ─────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nom = document.getElementById('nom').value.trim();
      const codeAgent = document.getElementById('code').value.trim() || null;
      
      if (!nom) return;

      // Si un token était fourni, la session doit exister.
      if (TOKEN && !SESSION_ID) {
        alertEl.className   = 'alert error';
        alertEl.textContent = '❌ Session expirée. Rescannez le QR code.';
        alertEl.style.display = 'block';
        return;
      }

      btn.disabled          = true;
      btn.textContent       = 'Enregistrement…';
      alertEl.style.display = 'none';

      try {
        const res = await fetch('/pointer', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nom_agent: nom,
          code_agent: codeAgent,
          session_id: SESSION_ID,
          lat:       userLat,
          lng:       userLng,
          device_id: DEVICE_ID,
          user_agent: navigator.userAgent,

        if (res.ok) {
          const isArrivee  = data.type !== 'sortie';
          const typeLabel  = isArrivee ? 'Arrivée' : 'Sortie';
          const typeEmoji  = isArrivee ? '🟢' : '🔴';

          // Message principal
          let html =
            `<strong>✅ Pointage ${typeLabel} enregistré !</strong><br>` +
            `${typeEmoji} Agent : <strong>${escHtml(data.nom_agent)}</strong><br>` +
            `📅 Date  : <strong>${data.date}</strong><br>` +
            `🕐 Heure : <strong>${data.heure}</strong>`;

          // Message alerte retard / heures sup
          if (data.alerte) {
            const isRetard = data.alerte.type === 'retard';
            html += `<div style="margin-top:12px;padding:10px 12px;border-radius:8px;` +
              (isRetard
                ? `background:#ffebee;border:1px solid #ef9a9a;color:#b71c1c;`
                : `background:#fff3e0;border:1px solid #ffcc80;color:#e65100;`) +
              `font-size:13px;font-weight:600;">${escHtml(data.alerte.message)}</div>`;
          }

          alertEl.className = 'alert success';
          alertEl.innerHTML = html;

          // Verrou local par type pour cet appareil aujourd'hui
          const todayKey = 'pointage_' + selectedType + '_done_' + new Date().toLocaleDateString('fr-FR');
          localStorage.setItem(todayKey, '1');

          // Masquer le bouton du type déjà effectué
          if (isArrivee) {
            btnArr.disabled    = true;
            btnArr.textContent = '✅ Arrivée faite';
          } else {
            btnSortie.disabled    = true;
            btnSortie.textContent = '✅ Sortie faite';
          }

          document.getElementById('nom').value = '';
          document.getElementById('code').value = '';
          
          // Effacer le sessionId pour forcer un nouveau scan du QR code
          SESSION_ID = null;
        } else {
          alertEl.className   = 'alert error';
          alertEl.textContent = '❌ ' + (data.error || 'Une erreur est survenue.');
        }
      } catch {
        alertEl.className   = 'alert error';
        alertEl.textContent = '❌ Impossible de joindre le serveur. Vérifiez votre connexion.';
      }

      alertEl.style.display = 'block';
      btn.disabled    = false;
      const currentLabel = selectedType === 'arrivee' ? '✅ Valider le Pointage Arrivée' : '✅ Valider le Pointage Sortie';
      btn.textContent = currentLabel;
    });

    // ─── Lancer l'initialisation du mode de pointage ─────────────────────────
    initializeSession();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js"></script>
</body>
</html>
